<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: main(~{::div})}">

<body>
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow-sm border-warning">
                <div class="card-header bg-warning">
                    <h2 class="h5 mb-0">Edit Review for <span th:text="${game.title}">Game</span></h2>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/reviews/edit/{id}(id=${review.id})}" th:object="${review}" method="post">
                        <div class="mb-3">
                            <label for="rating" class="form-label">Rating (1-5)</label>
                            <select th:field="*{rating}" class="form-select" required>
                                <option value="5">5 - Excellent</option>
                                <option value="4">4 - Very Good</option>
                                <option value="3">3 - Good</option>
                                <option value="2">2 - Fair</option>
                                <option value="1">1 - Poor</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="comment" class="form-label">Review Comment</label>
                            <textarea th:field="*{comment}" class="form-control" rows="4"
                                placeholder="Update your experience..."></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/games/{id}(id=${review.gameId})}"
                                class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-warning px-4 text-dark font-weight-bold">Update
                                Review</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: main(~{::div})}">

<body>
    <div class="row justify-content-center mt-5">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h2 class="h5 mb-0">Add New Game to Library</h2>
                </div>
                <div class="card-body px-5 py-4">
                    <form th:action="@{/games/new}" th:object="${game}" method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. Catan"
                                required>
                            <div class="alert alert-danger p-1 small mt-1" th:if="${#fields.hasErrors('title')}"
                                th:errors="*{title}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="genre" class="form-label">Genre</label>
                            <input type="text" th:field="*{genre}" class="form-control" placeholder="e.g. Strategy">
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"
                                placeholder="Brief overview of how the game plays..."></textarea>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/games}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5">Add Game</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: main(~{::div})}">

<body>
    <nav aria-label="breadcrumb" class="mt-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/games}">Home</a></li>
            <li class="breadcrumb-item active" th:text="${game.title}">Game Details</li>
        </ol>
    </nav>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h4" th:text="${game.title}">Game Title</h2>
                    <p class="badge bg-secondary mb-3" th:text="${game.genre}">Genre</p>
                    <p class="text-muted" th:text="${game.description}">Description</p>
                    <hr>
                    <p class="small text-muted mb-0">Added by: <span th:text="${game.createdBy}">Admin</span></p>
                </div>
            </div>
            <div class="mt-4" sec:authorize="isAuthenticated()">
                <a th:href="@{/reviews/add/{id}(id=${game.id})}" class="btn btn-success btn-lg w-100">Write a Review</a>
            </div>
            <div class="mt-3" sec:authorize="isAnonymous()">
                <div class="alert alert-info py-2 small">
                    <a th:href="@{/login}">Login</a> to leave a review.
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <h3 class="h4 mb-4">Reviews (<span th:text="${#lists.size(reviews)}">0</span>)</h3>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <div th:each="review : ${reviews}" class="card mb-3 shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="rating text-warning font-weight-bold">
                            <span th:each="i : ${#numbers.sequence(1, 5)}">
                                <span th:text="${i <= review.rating ? '★' : '☆'}"></span>
                            </span>
                            <span class="ms-1 text-dark" th:text="${review.rating + '/5'}">5/5</span>
                        </div>
                        <div sec:authorize="hasRole('MANAGER')" class="btn-group">
                            <a th:href="@{/reviews/edit/{id}(id=${review.id})}"
                                class="btn btn-outline-secondary btn-sm">Edit</a>
                            <form th:action="@{/reviews/delete/{id}(id=${review.id})}" method="post"
                                onsubmit="return confirm('Delete this review?')">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                            </form>
                        </div>
                    </div>
                    <p class="card-text italic"
                        th:text="${#strings.isEmpty(review.comment) ? '(No comment provided)' : review.comment}">Comment
                        content...</p>
                    <div class="d-flex justify-content-between text-muted small mt-3">
                        <span th:text="${'By: ' + review.createdBy}">Author</span>
                        <span th:text="${#temporals.format(review.createdDate, 'dd MMM yyyy HH:mm')}">Date</span>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-4 bg-light rounded shadow-sm border">
                <p class="text-muted mb-0">No reviews yet. Be the first to share your experience!</p>
            </div>
        </div>
    </div>
</body>

</html>
